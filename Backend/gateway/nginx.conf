events {}

http {
  upstream auth_service {
    server auth-service:3001;
  }

  upstream media_service {
    server media-service:3002;
  }

  upstream chat_service {
    server chat-service:3003;
  }

  upstream ticket_service {
    server ticket-service:3004;
  }

  server {
    listen 80;

    location = / {
      add_header Content-Type application/json;
      return 200 '{"service":"digche-gateway","status":"ok"}\n';
    }

    location = /health {
      add_header Content-Type application/json;
      return 200 '{"service":"digche-gateway","status":"ok"}\n';
    }

    location = /docs {
      return 302 /docs/;
    }

    location /docs/ {
      proxy_pass http://auth_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
      proxy_pass http://auth_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/auth/ {
      proxy_pass http://auth_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/admin-users {
      proxy_pass http://auth_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
      proxy_pass http://media_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /chat/ {
      proxy_pass http://chat_service;
      proxy_http_version 1.1;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tickets {
      proxy_pass http://ticket_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      add_header Content-Type application/json;
      return 404 '{"error":{"code":"NOT_FOUND","message":"Route not found"}}\n';
    }
  }
}
