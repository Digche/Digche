events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  client_max_body_size 2m;
  proxy_connect_timeout 10s;
  proxy_send_timeout 60s;
  proxy_read_timeout 60s;

  limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
  limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=1r/s;

  upstream auth_service {
    server auth-service:3001;
  }

  upstream media_service {
    server media-service:3002;
  }

  upstream chat_service {
    server chat-service:3003;
  }

  upstream ticket_service {
    server ticket-service:3004;
  }

  server {
    listen 80;

    location = / {
      add_header Content-Type application/json;
      return 200 '{"service":"digche-gateway","status":"ok"}\n';
    }

    location = /health {
      add_header Content-Type application/json;
      return 200 '{"service":"digche-gateway","status":"ok"}\n';
    }

    location = /docs {
      return 302 /docs/;
    }

    location /docs/ {
      proxy_pass http://auth_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
      limit_req zone=auth_per_ip burst=10 nodelay;
      proxy_pass http://auth_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/auth/ {
      limit_req zone=auth_per_ip burst=10 nodelay;
      proxy_pass http://auth_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/admin-users {
      limit_req zone=api_per_ip burst=30 nodelay;
      proxy_pass http://auth_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }


    location /admin/chefs {
      limit_req zone=api_per_ip burst=30 nodelay;
      proxy_pass http://auth_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media/ {
      limit_req zone=api_per_ip burst=30 nodelay;
      proxy_pass http://media_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /chat/ {
      limit_req zone=api_per_ip burst=60 nodelay;
      proxy_pass http://chat_service;
      proxy_http_version 1.1;

      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tickets {
      limit_req zone=api_per_ip burst=30 nodelay;
      proxy_pass http://ticket_service;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      add_header Content-Type application/json;
      return 404 '{"error":{"code":"NOT_FOUND","message":"Route not found"}}\n';
    }
  }
}
