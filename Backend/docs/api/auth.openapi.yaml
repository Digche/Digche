openapi: 3.0.3
info:
  title: Food Platform Auth Service API
  version: 1.0.0
  description: |
    Auth service for public users, chefs, admins and manager login flows.

servers:
  - url: http://localhost:8080
    description: Local Gateway

tags:
  - name: Public Auth
    description: Public client and chef authentication
  - name: Admin Auth
    description: Admin panel authentication
  - name: Admin Users
    description: Admin user management by manager
  - name: Admin Chefs
    description: Chef account management by admin and manager

paths:
  /auth/health:
    get:
      tags:
        - Public Auth
      summary: Public auth health check
      responses:
        "200":
          description: Public auth is healthy

  /auth/request-otp:
    post:
      tags:
        - Public Auth
      summary: Request OTP for public login or registration
      description: |
        User selects role and flow from the UI.
        flow=login means the user is trying to login.
        flow=register means the user is trying to register.
        The internal OTP purpose is still handled by the backend.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPublicOtpInput"
            examples:
              clientLogin:
                value:
                  phone: "09121234567"
                  role: "client"
                  flow: "login"
              clientRegister:
                value:
                  phone: "09121234567"
                  role: "client"
                  flow: "register"
              chefRegister:
                value:
                  phone: "09129876543"
                  role: "chef"
                  flow: "register"
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicOtpSentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Public account already exists for this phone and role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/verify-otp:
    post:
      tags:
        - Public Auth
      summary: Verify OTP for public login or registration
      description: |
        If the user already has the selected role and completed profile, a public session is returned.
        If registration is required, a temporary registrationToken is returned for completing registration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPublicOtpInput"
            examples:
              clientLogin:
                value:
                  phone: "09121234567"
                  code: "123456"
                  role: "client"
                  flow: "login"
              clientRegister:
                value:
                  phone: "09121234567"
                  code: "123456"
                  role: "client"
                  flow: "register"
              chefRegister:
                value:
                  phone: "09129876543"
                  code: "123456"
                  role: "chef"
                  flow: "register"
      responses:
        "200":
          description: Public OTP verified. Returns either a public session or a registration token.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/PublicAuthResponse"
                  - $ref: "#/components/schemas/RegistrationRequiredResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Public account already exists for this phone and role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register/complete:
    post:
      tags:
        - Public Auth
      summary: Complete public user registration
      description: Completes registration after OTP verification using a temporary registration token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteRegistrationInput"
            examples:
              client:
                value:
                  registrationToken: "registration_token_here"
                  firstName: "Ali"
                  lastName: "Ahmadi"
                  username: "ali_ahmadi"
              chef:
                value:
                  registrationToken: "registration_token_here"
                  firstName: "Reza"
                  lastName: "Chef"
                  username: "reza_chef"
      responses:
        "201":
          description: Registration completed and public session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Username is already in use, profile already completed, or public account already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags:
        - Public Auth
      summary: Refresh public access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: Public session refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/logout:
    post:
      tags:
        - Public Auth
      summary: Logout public session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"

  /auth/me:
    get:
      tags:
        - Public Auth
      summary: Get current public user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current public user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/PublicUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/me/first-name:
    patch:
      tags:
        - Public Auth
      summary: Update current public user's first name
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFirstNameInput"
      responses:
        "200":
          description: First name updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfileUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/me/last-name:
    patch:
      tags:
        - Public Auth
      summary: Update current public user's last name
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLastNameInput"
      responses:
        "200":
          description: Last name updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfileUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/me/username:
    patch:
      tags:
        - Public Auth
      summary: Update current public user's username
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUsernameInput"
      responses:
        "200":
          description: Username updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfileUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Username is already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me/photo-url:
    patch:
      tags:
        - Public Auth
      summary: Update current public user's photo URL
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePhotoUrlInput"
      responses:
        "200":
          description: Photo URL updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfileUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/me/address:
    patch:
      tags:
        - Public Auth
      summary: Update current public user's address
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAddressInput"
      responses:
        "200":
          description: Address updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicProfileUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/change-phone/request-otp:
    post:
      tags:
        - Public Auth
      summary: Request OTP for changing public user phone
      description: Sends an OTP to the new phone number. Requires public access token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPhoneChangeOtpInput"
            examples:
              default:
                value:
                  newPhone: "09121234567"
      responses:
        "200":
          description: OTP sent to new phone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhoneChangeOtpSentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Phone number is already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/change-phone/verify:
    post:
      tags:
        - Public Auth
      summary: Verify OTP and change public user phone
      description: Changes the authenticated user's phone number, revokes previous refresh tokens, and returns a new access token and refresh token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPhoneChangeInput"
            examples:
              default:
                value:
                  newPhone: "09121234567"
                  code: "123456"
      responses:
        "200":
          description: Phone number changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Phone number is already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/auth/health:
    get:
      tags:
        - Admin Auth
      summary: Admin auth health check
      responses:
        "200":
          description: Admin auth is healthy

  /admin/auth/request-otp:
    post:
      tags:
        - Admin Auth
      summary: Request OTP for admin panel login
      description: Only active admin or manager phone numbers can request OTP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestAdminOtpInput"
            examples:
              default:
                value:
                  phone: "09031241172"
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpSentResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/auth/verify-otp:
    post:
      tags:
        - Admin Auth
      summary: Verify OTP and login to admin panel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyAdminOtpInput"
            examples:
              default:
                value:
                  phone: "09031241172"
                  code: "123456"
      responses:
        "200":
          description: Admin session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/auth/refresh:
    post:
      tags:
        - Admin Auth
      summary: Refresh admin access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: Admin session refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/auth/logout:
    post:
      tags:
        - Admin Auth
      summary: Logout admin session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"

  /admin/auth/me:
    get:
      tags:
        - Admin Auth
      summary: Get current admin user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current admin user
          content:
            application/json:
              schema:
                type: object
                properties:
                  admin:
                    $ref: "#/components/schemas/AdminUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/auth/me/first-name:
    patch:
      tags:
        - Admin Auth
      summary: Update current admin user's first name
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFirstNameInput"
      responses:
        "200":
          description: First name updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProfileUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/auth/me/last-name:
    patch:
      tags:
        - Admin Auth
      summary: Update current admin user's last name
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLastNameInput"
      responses:
        "200":
          description: Last name updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProfileUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/auth/me/username:
    patch:
      tags:
        - Admin Auth
      summary: Update current admin user's username
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUsernameInput"
      responses:
        "200":
          description: Username updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProfileUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Username is already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/auth/me/photo-url:
    patch:
      tags:
        - Admin Auth
      summary: Update current admin user's photo URL
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePhotoUrlInput"
      responses:
        "200":
          description: Photo URL updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminProfileUpdateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/auth/change-phone/request-otp:
    post:
      tags:
        - Admin Auth
      summary: Request OTP for changing manager phone
      description: Sends an OTP to the new phone number. Only manager can use this endpoint.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPhoneChangeOtpInput"
            examples:
              default:
                value:
                  newPhone: "09121234567"
      responses:
        "200":
          description: OTP sent to new manager phone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhoneChangeOtpSentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Phone number is already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/auth/change-phone/verify:
    post:
      tags:
        - Admin Auth
      summary: Verify OTP and change manager phone
      description: Changes the authenticated manager's phone number, revokes previous refresh tokens, and returns a new access token and refresh token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPhoneChangeInput"
            examples:
              default:
                value:
                  newPhone: "09121234567"
                  code: "123456"
      responses:
        "200":
          description: Manager phone changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Phone number is already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/admin-users:
    post:
      tags:
        - Admin Users
      summary: Add a new admin user
      description: Only manager can add a new admin phone number to the admin panel allowlist.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddAdminUserInput"
            examples:
              default:
                value:
                  phone: "09121234567"
      responses:
        "201":
          description: Admin user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddAdminUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Admin user already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags:
        - Admin Users
      summary: List admin users
      description: Only manager can list admin users.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/admin-users/{id}/phone:
    patch:
      tags:
        - Admin Users
      summary: Change admin user phone
      description: Only manager can change a normal admin user's phone number. Managers cannot change their own phone or another manager's phone from this endpoint. Previous refresh tokens for the target admin will be revoked.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Admin user id
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeAdminUserPhoneInput"
            examples:
              default:
                value:
                  newPhone: "09121234567"
      responses:
        "200":
          description: Admin phone changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeAdminUserPhoneResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Phone number is already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/admin-users/{id}/disable:
    patch:
      tags:
        - Admin Users
      summary: Disable an admin user
      description: Only manager can disable a normal admin user. Managers cannot disable themselves or other managers from this endpoint.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Admin user id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Admin user disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableAdminUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/admin-users/{id}/enable:
    patch:
      tags:
        - Admin Users
      summary: Enable an admin user
      description: Only manager can enable a normal disabled admin user. Managers cannot enable themselves or other managers from this endpoint.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Admin user id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Admin user enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnableAdminUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/chefs:
    get:
      tags:
        - Admin Chefs
      summary: List all chefs
      description: Admin and manager can list all chef accounts with user profile details.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Chef list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChefListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/chefs/{userId}/suspend:
    patch:
      tags:
        - Admin Chefs
      summary: Suspend a chef
      description: Admin and manager can change a chef account status from active to suspended. Existing public refresh tokens for the chef selected role are revoked.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: Chef user id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Chef suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChefStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/chefs/{userId}/activate:
    patch:
      tags:
        - Admin Chefs
      summary: Activate a chef
      description: Admin and manager can change a suspended chef account status back to active.
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          description: Chef user id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Chef activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChefStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/auth/profiles/resolve:
    post:
      tags:
        - Internal
      summary: Resolve actor display profiles for internal services
      description: Internal endpoint used by chat-service to hydrate participants. Requires x-internal-api-key.
      parameters:
        - in: header
          name: x-internal-api-key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - participants
              properties:
                participants:
                  type: array
                  items:
                    type: object
                    required:
                      - id
                      - type
                    properties:
                      id:
                        type: string
                        format: uuid
                      type:
                        type: string
                        enum:
                          - user
                          - admin
      responses:
        "200":
          description: Resolved profiles
          content:
            application/json:
              schema:
                type: object
                properties:
                  profiles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        type:
                          type: string
                          enum:
                            - user
                            - admin
                        displayName:
                          type: string
                          nullable: true
                        photoUrl:
                          type: string
                          nullable: true
                        phone:
                          type: string
                          nullable: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    PublicAuthFlow:
      type: string
      enum:
        - login
        - register
      example: register

    RequestPublicOtpInput:
      type: object
      required:
        - phone
        - role
        - flow
      properties:
        phone:
          type: string
          example: "09121234567"
        role:
          type: string
          enum:
            - client
            - chef
          example: client
        flow:
          $ref: "#/components/schemas/PublicAuthFlow"

    RequestAdminOtpInput:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          example: "09121234567"

    VerifyPublicOtpInput:
      type: object
      required:
        - phone
        - code
        - role
        - flow
      properties:
        phone:
          type: string
          example: "09121234567"
        code:
          type: string
          example: "123456"
        role:
          type: string
          enum:
            - client
            - chef
          example: client
        flow:
          $ref: "#/components/schemas/PublicAuthFlow"

    VerifyAdminOtpInput:
      type: object
      required:
        - phone
        - code
      properties:
        phone:
          type: string
          example: "09121234567"
        code:
          type: string
          example: "123456"

    CompleteRegistrationInput:
      type: object
      required:
        - registrationToken
        - firstName
        - lastName
        - username
      properties:
        registrationToken:
          type: string
          example: "registration_token_here"
        firstName:
          type: string
          example: "Ali"
        lastName:
          type: string
          example: "Ahmadi"
        username:
          type: string
          example: "ali_ahmadi"

    RefreshInput:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          example: "refresh_token_here"

    RequestPhoneChangeOtpInput:
      type: object
      required:
        - newPhone
      properties:
        newPhone:
          type: string
          example: "09121234567"

    VerifyPhoneChangeInput:
      type: object
      required:
        - newPhone
        - code
      properties:
        newPhone:
          type: string
          example: "09121234567"
        code:
          type: string
          example: "123456"

    ChangeAdminUserPhoneInput:
      type: object
      required:
        - newPhone
      properties:
        newPhone:
          type: string
          example: "09121234567"

    AddAdminUserInput:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          example: "09121234567"

    UpdateFirstNameInput:
      type: object
      required:
        - firstName
      properties:
        firstName:
          type: string
          maxLength: 100
          example: "Ali"

    UpdateLastNameInput:
      type: object
      required:
        - lastName
      properties:
        lastName:
          type: string
          maxLength: 100
          example: "Ahmadi"

    UpdateUsernameInput:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: "^[a-zA-Z0-9_]+$"
          example: "ali_ahmadi"

    UpdatePhotoUrlInput:
      type: object
      required:
        - photoUrl
      properties:
        photoUrl:
          type: string
          nullable: true
          maxLength: 2048
          example: "https://cdn.example.com/users/user-1/profile.jpg"

    UpdateAddressInput:
      type: object
      required:
        - address
      properties:
        address:
          type: string
          nullable: true
          maxLength: 500
          example: "Tehran, Vanak Square"

    PublicOtpSentResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP sent successfully
        phone:
          type: string
          example: "+989121234567"
        role:
          type: string
          enum:
            - client
            - chef
          example: client
        flow:
          $ref: "#/components/schemas/PublicAuthFlow"
        expiresAt:
          type: string
          format: date-time

    OtpSentResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP sent successfully
        phone:
          type: string
          example: "+989031241172"
        expiresAt:
          type: string
          format: date-time

    PhoneChangeOtpSentResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP sent successfully
        newPhone:
          type: string
          example: "+989121234567"
        expiresAt:
          type: string
          format: date-time

    RegistrationRequiredResponse:
      type: object
      properties:
        requiresRegistration:
          type: boolean
          example: true
        registrationToken:
          type: string
          example: "registration_token_here"
        phone:
          type: string
          example: "+989121234567"
        role:
          type: string
          enum:
            - client
            - chef
          example: client
        flow:
          $ref: "#/components/schemas/PublicAuthFlow"

    PublicUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          example: "+989121234567"
        firstName:
          type: string
          example: "Ali"
        lastName:
          type: string
          example: "Ahmadi"
        username:
          type: string
          example: "ali_ahmadi"
        address:
          type: string
          nullable: true
          example: "Tehran, Vanak Square"
        photoUrl:
          type: string
          nullable: true
          example: "https://cdn.example.com/users/user-1/profile.jpg"
        roles:
          type: array
          items:
            type: string
            enum:
              - client
              - chef
        selectedRole:
          type: string
          enum:
            - client
            - chef
        chef:
          type: object
          nullable: true
          properties:
            status:
              $ref: "#/components/schemas/ChefAccountStatus"

    ChefAccountStatus:
      type: string
      enum:
        - active
        - suspended
      example: active

    ChefUserDetails:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          example: "+989121234567"
        firstName:
          type: string
          nullable: true
          example: "Sara"
        lastName:
          type: string
          nullable: true
          example: "Chef"
        username:
          type: string
          nullable: true
          example: "sara_chef"
        photoUrl:
          type: string
          nullable: true
          example: "https://cdn.example.com/users/user-1/profile.jpg"
        address:
          type: string
          nullable: true
          example: "Tehran, Vanak Square"
        roles:
          type: array
          items:
            type: string
            enum:
              - client
              - chef
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    ChefWithDetails:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/ChefAccountStatus"
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
        user:
          $ref: "#/components/schemas/ChefUserDetails"

    ChefStatus:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/ChefAccountStatus"
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    AdminUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          example: "+989031241172"
        firstName:
          type: string
          nullable: true
          example: "Sara"
        lastName:
          type: string
          nullable: true
          example: "Mohammadi"
        username:
          type: string
          nullable: true
          example: "sara_admin"
        role:
          type: string
          enum:
            - admin
            - manager
        photoUrl:
          type: string
          nullable: true
          example: "https://cdn.example.com/admins/admin-1/profile.jpg"
        isManager:
          type: boolean

    AdminUserWithStatus:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          example: "+989121234567"
        firstName:
          type: string
          nullable: true
          example: "Sara"
        lastName:
          type: string
          nullable: true
          example: "Mohammadi"
        username:
          type: string
          nullable: true
          example: "sara_admin"
        role:
          type: string
          enum:
            - admin
            - manager
          example: admin
        status:
          type: string
          enum:
            - active
            - disabled
          example: active
        photoUrl:
          type: string
          nullable: true
          example: "https://cdn.example.com/admins/admin-1/profile.jpg"
        createdBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    PublicAuthResponse:
      type: object
      properties:
        requiresRegistration:
          type: boolean
          example: false
        flow:
          $ref: "#/components/schemas/PublicAuthFlow"
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/PublicUser"

    PublicProfileUpdateResponse:
      type: object
      properties:
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/PublicUser"

    AdminAuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        admin:
          $ref: "#/components/schemas/AdminUser"

    AdminProfileUpdateResponse:
      type: object
      properties:
        accessToken:
          type: string
        admin:
          $ref: "#/components/schemas/AdminUser"

    AddAdminUserResponse:
      type: object
      properties:
        admin:
          $ref: "#/components/schemas/AdminUserWithStatus"

    AdminUserListResponse:
      type: object
      properties:
        admins:
          type: array
          items:
            $ref: "#/components/schemas/AdminUserWithStatus"

    ChefListResponse:
      type: object
      properties:
        chefs:
          type: array
          items:
            $ref: "#/components/schemas/ChefWithDetails"

    ChefStatusResponse:
      type: object
      properties:
        chef:
          $ref: "#/components/schemas/ChefStatus"

    ChangeAdminUserPhoneResponse:
      type: object
      properties:
        admin:
          $ref: "#/components/schemas/AdminUserWithStatus"

    DisableAdminUserResponse:
      type: object
      properties:
        admin:
          $ref: "#/components/schemas/AdminUserWithStatus"

    EnableAdminUserResponse:
      type: object
      properties:
        admin:
          $ref: "#/components/schemas/AdminUserWithStatus"

    LogoutResponse:
      type: object
      properties:
        message:
          type: string
          example: Logged out successfully
        success:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: PUBLIC_ACCOUNT_ALREADY_EXISTS
            message:
              type: string
              example: Public account already exists for this phone and role

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
