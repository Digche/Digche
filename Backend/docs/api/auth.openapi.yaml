openapi: 3.0.3
info:
  title: Food Platform Auth Service API
  version: 1.0.0
  description: |
    Auth service for public users, chefs, admins and manager login flows.

servers:
  - url: http://localhost:8080
    description: Local Gateway
  - url: http://localhost:3001
    description: Direct Auth Service - development only

tags:
  - name: Public Auth
    description: Public client and chef authentication
  - name: Admin Auth
    description: Admin panel authentication
  - name: Admin Users
    description: Admin user management by manager

paths:
  /auth/health:
    get:
      tags:
        - Public Auth
      summary: Public auth health check
      responses:
        "200":
          description: Public auth is healthy

  /auth/request-otp:
    post:
      tags:
        - Public Auth
      summary: Request OTP for public login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestOtpInput"
            examples:
              default:
                value:
                  phone: "09121234567"
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpSentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/verify-otp:
    post:
      tags:
        - Public Auth
      summary: Verify OTP and login as client or chef
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPublicOtpInput"
            examples:
              client:
                value:
                  phone: "09121234567"
                  code: "123456"
                  role: "client"
              chef:
                value:
                  phone: "09121234567"
                  code: "123456"
                  role: "chef"
      responses:
        "200":
          description: Public session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/refresh:
    post:
      tags:
        - Public Auth
      summary: Refresh public access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: Public session refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      tags:
        - Public Auth
      summary: Logout public session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"

  /auth/me:
    get:
      tags:
        - Public Auth
      summary: Get current public user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current public user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/PublicUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /auth/change-phone/request-otp:
    post:
      tags:
        - Public Auth
      summary: Request OTP for changing public user phone
      description: Sends an OTP to the new phone number. Requires public access token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPhoneChangeOtpInput"
            examples:
              default:
                value:
                  newPhone: "09121234567"
      responses:
        "200":
          description: OTP sent to new phone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhoneChangeOtpSentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Phone number is already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/change-phone/verify:
    post:
      tags:
        - Public Auth
      summary: Verify OTP and change public user phone
      description: Changes the authenticated user's phone number, revokes previous refresh tokens, and returns a new access token and refresh token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPhoneChangeInput"
            examples:
              default:
                value:
                  newPhone: "09121234567"
                  code: "123456"
      responses:
        "200":
          description: Phone number changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Phone number is already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/auth/health:
    get:
      tags:
        - Admin Auth
      summary: Admin auth health check
      responses:
        "200":
          description: Admin auth is healthy

  /admin/auth/request-otp:
    post:
      tags:
        - Admin Auth
      summary: Request OTP for admin panel login
      description: Only active admin or manager phone numbers can request OTP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestOtpInput"
            examples:
              default:
                value:
                  phone: "09121234567"
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpSentResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/auth/verify-otp:
    post:
      tags:
        - Admin Auth
      summary: Verify OTP and login to admin panel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyAdminOtpInput"
            examples:
              default:
                value:
                  phone: "09121234567"
                  code: "123456"
      responses:
        "200":
          description: Admin session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/auth/refresh:
    post:
      tags:
        - Admin Auth
      summary: Refresh admin access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: Admin session refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /admin/auth/logout:
    post:
      tags:
        - Admin Auth
      summary: Logout admin session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"

  /admin/auth/me:
    get:
      tags:
        - Admin Auth
      summary: Get current admin user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current admin user
          content:
            application/json:
              schema:
                type: object
                properties:
                  admin:
                    $ref: "#/components/schemas/AdminUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/auth/change-phone/request-otp:
    post:
      tags:
        - Admin Auth
      summary: Request OTP for changing manager phone
      description: Sends an OTP to the new phone number. Only manager can use this endpoint.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPhoneChangeOtpInput"
            examples:
              default:
                value:
                  newPhone: "09121234567"
      responses:
        "200":
          description: OTP sent to new manager phone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhoneChangeOtpSentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Phone number is already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /admin/auth/change-phone/verify:
    post:
      tags:
        - Admin Auth
      summary: Verify OTP and change manager phone
      description: Changes the authenticated manager's phone number, revokes previous refresh tokens, and returns a new access token and refresh token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyPhoneChangeInput"
            examples:
              default:
                value:
                  newPhone: "09121234567"
                  code: "123456"
      responses:
        "200":
          description: Manager phone changed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Phone number is already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/admin-users:
    post:
      tags:
        - Admin Users
      summary: Add a new admin user
      description: Only manager can add a new admin phone number to the admin panel allowlist.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddAdminUserInput"
            examples:
              default:
                value:
                  phone: "09121234567"
      responses:
        "201":
          description: Admin user created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddAdminUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Admin user already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags:
        - Admin Users
      summary: List admin users
      description: Only manager can list admin users.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin users list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/admin-users/{id}/phone:
    patch:
      tags:
        - Admin Users
      summary: Change admin user phone
      description: Only manager can change a normal admin user's phone number. Managers cannot change their own phone or another manager's phone from this endpoint. Previous refresh tokens for the target admin will be revoked.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Admin user id
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeAdminUserPhoneInput"
            examples:
              default:
                value:
                  newPhone: "09121234567"
      responses:
        "200":
          description: Admin phone changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeAdminUserPhoneResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Phone number is already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/admin-users/{id}/disable:
    patch:
      tags:
        - Admin Users
      summary: Disable an admin user
      description: Only manager can disable a normal admin user. Managers cannot disable themselves or other managers from this endpoint.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Admin user id
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Admin user disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisableAdminUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RequestOtpInput:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          example: "09121234567"

    VerifyPublicOtpInput:
      type: object
      required:
        - phone
        - code
        - role
      properties:
        phone:
          type: string
          example: "09121234567"
        code:
          type: string
          example: "123456"
        role:
          type: string
          enum:
            - client
            - chef
          example: client

    VerifyAdminOtpInput:
      type: object
      required:
        - phone
        - code
      properties:
        phone:
          type: string
          example: "09121234567"
        code:
          type: string
          example: "123456"

    RefreshInput:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          example: "refresh_token_here"

    RequestPhoneChangeOtpInput:
      type: object
      required:
        - newPhone
      properties:
        newPhone:
          type: string
          example: "09121234567"

    VerifyPhoneChangeInput:
      type: object
      required:
        - newPhone
        - code
      properties:
        newPhone:
          type: string
          example: "09121234567"
        code:
          type: string
          example: "123456"

    ChangeAdminUserPhoneInput:
      type: object
      required:
        - newPhone
      properties:
        newPhone:
          type: string
          example: "09121234567"

    AddAdminUserInput:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          example: "09121234567"

    OtpSentResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP sent successfully
        phone:
          type: string
          example: "+989121234567"
        expiresAt:
          type: string
          format: date-time

    PhoneChangeOtpSentResponse:
      type: object
      properties:
        message:
          type: string
          example: OTP sent successfully
        newPhone:
          type: string
          example: "+989121234567"
        expiresAt:
          type: string
          format: date-time

    PublicUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          example: "+989121234567"
        roles:
          type: array
          items:
            type: string
            enum:
              - client
              - chef
        selectedRole:
          type: string
          enum:
            - client
            - chef
        chef:
          type: object
          nullable: true
          properties:
            status:
              type: string
              enum:
                - pending
                - active
                - rejected
                - disabled

    AdminUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          example: "+989121234567"
        role:
          type: string
          enum:
            - admin
            - manager
        isManager:
          type: boolean

    AdminUserWithStatus:
      type: object
      properties:
        id:
          type: string
          format: uuid
        phone:
          type: string
          example: "+989121234567"
        role:
          type: string
          enum:
            - admin
            - manager
          example: admin
        status:
          type: string
          enum:
            - active
            - disabled
          example: active
        createdBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    PublicAuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/PublicUser"

    AdminAuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        admin:
          $ref: "#/components/schemas/AdminUser"

    AddAdminUserResponse:
      type: object
      properties:
        admin:
          $ref: "#/components/schemas/AdminUserWithStatus"

    AdminUserListResponse:
      type: object
      properties:
        admins:
          type: array
          items:
            $ref: "#/components/schemas/AdminUserWithStatus"

    ChangeAdminUserPhoneResponse:
      type: object
      properties:
        admin:
          $ref: "#/components/schemas/AdminUserWithStatus"

    DisableAdminUserResponse:
      type: object
      properties:
        admin:
          $ref: "#/components/schemas/AdminUserWithStatus"

    LogoutResponse:
      type: object
      properties:
        message:
          type: string
          example: Logged out successfully
        success:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: UNAUTHORIZED
            message:
              type: string
              example: Invalid or expired OTP code

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    TooManyRequests:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"