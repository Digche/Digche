services:
  gateway:
    image: nginx:1.27-alpine
    container_name: food_gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
    networks:
      - food_network

  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: auth_service
    env_file:
      - ./services/auth/.env
    expose:
      - "3001"
    volumes:
      - ./docs:/docs:ro
    depends_on:
      - auth-db
      - auth-redis
    networks:
      - food_network

  auth-db:
    image: postgres:16-alpine
    container_name: auth_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    expose:
      - "5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - food_network

  auth-redis:
    image: redis:7-alpine
    container_name: auth_redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - auth_redis_data:/data
    networks:
      - food_network

volumes:
  auth_db_data:
  auth_redis_data:

networks:
  food_network:
    driver: bridge