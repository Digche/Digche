services:
  gateway:
    image: nginx:1.27-alpine
    container_name: food_gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
    networks:
      - food_network

  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: auth_service
    env_file:
      - ./services/auth/.env
    ports:
      - "3001:3001"
    depends_on:
      - auth-db
    networks:
      - food_network

  auth-db:
    image: postgres:16-alpine
    container_name: auth_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - food_network

volumes:
  auth_db_data:

networks:
  food_network:
    driver: bridge